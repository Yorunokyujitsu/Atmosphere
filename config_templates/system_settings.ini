[eupld]
; 닌텐도 서버로 오류 리포트 업로드 제어.
; upload_enabled=u8!0x0

[usb]
; 홈브류 USB 3.0 활성화 제어.
usb30_force_enabled=u8!0x1

[ro]
; RO의 NRO 유효성 검사 간이화 제어 (시그패치가 동일한 역할을 수행합니다)
; ease_nro_restriction=u8!0x1

[lm]
; SD 카드에 lm 기록 여부 제어.
; enable_sd_card_logging=u8!0x1
; sd_card_log_output_directory=str!atmosphere/binlogs

[erpt]
; 에러 리포트 보존 여부 제어.
disable_automatic_report_cleanup=u8!0x1

[atmosphere]
; 글리칭 재부팅 타이밍 제어.
; fatal_auto_reboot_interval=u64!0x0

; 재부팅 설정값 제어. (payload, normal, rcm)
; power_menu_reboot_function=str!payload

; dmnt 치트 설정 여부 제어.
dmnt_cheats_enabled_by_default=u8!0x0

; 타이틀 실행 시 dmnt 치트 저장 여부 제어.
dmnt_always_save_cheat_toggles=u8!0x1

; HBL의 BIS 파티션 쓰기 활성화 여부 제어.
; enable_hbl_bis_write=u8!0x0

; HBL의 CAL0 파티션 읽기 활성화 여부 제어.
; enable_hbl_cal_read=u8!0x0

; fs.mitm 저장 경로를 SD카드로 변경할지 여부 제어.
; fsmitm_redirect_saves_to_sd=u8!0x0

; 디버깅 모드 플래그 활성화 제어.
; enable_am_debug_mode=u8!0x0

; dns.mitm 활성화 제어.
; enable_dns_mitm=u8!0x1

; dns.mitm 기본 파일 활성화 제어. 
; add_defaults_to_dns_hosts=u8!0x1

; 디버깅을 위한 dns.mitm의 SD카드 저장 여부 제어.
; enable_dns_mitm_debug_log=u8!0x0

; htc 사용 여부 제어.
; enable_htc=u8!0x0

; Asanosphere 로그 관리자 사용 여부 제어.
; enable_log_manager=u8!0x0

; 시스/에뮤낸드 간 블루투스 페어링 여부 제어.
enable_external_bluetooth_db=u8!0x1

[hbloader]
; 애플릿 모드에서의 메모리 힙 사이즈 제어.
; applet_heap_size=u64!0x0

; 홈브류 사용 중 애플릿 모드 실행 시 예약 메모리 힙 제어.
; applet_heap_reservation_size=u64!0x8600000