[exosphere]
; debugmode : 0=비활성화, 1=활성화(기본값)
; 커널 디버그 모드를 제어하며, 비활성화시 디버깅이 중단됩니다.
debugmode=1

; debugmode_user: 0=활성화(기본값), 1=비활성화
; 사용자 영역의 디버그 모드를 제어합니다.
debugmode_user=0

; disable_user_exception_handlers: 0=활성화(기본값), 1=비활성화
; 오류 시 유저 예외 처리기를 실행할지 여부를 제어합니다.
; 안내: 이로 인해 Asanosphere가 정상적으로 작동하지 않을 수 있습니다.
disable_user_exception_handlers=0

; enable_user_pmu_access: 0=비활성화(기본값), 1=활성화
; 사용자 영역의 PMU 레지스터 엑세스 여부를 제어합니다.
; 안내: 시스템 코드에 영향을 미칠 수도 있습니다.
enable_user_pmu_access=0

; blank_prodinfo_xxxmmc: 0=비활성화(기본값), 1=활성화
; 커펌에서 시리얼 정보 블라인드 여부를 제어합니다.
; 안내: 활성화 후 인터넷 접속시, 기기 밴의 위험이 있습니다.
; 안내: 활성화 시 DNS차단 설정과 반드시 함께 사용하세요.
blank_prodinfo_sysmmc=0
blank_prodinfo_emummc=1

; allow_writing_to_cal_sysmmc: 0=비활성화(기본값), 1=활성화
; 시스낸드 커펌에서 홈브류 사용시 PRODINFO 작성 여부를 제어합니다.
; 안내: 순정 시스낸드의 백업파일이 없다면, 절대 이용하지 마십시오.
allow_writing_to_cal_sysmmc=0

; log_port: 0=UART-A(기본값), 1=UART-B, 2=UART-C, 3=UART-D
; 로깅을 위해 설정할 익소스피어의 UART 포트를 제어합니다.
log_port=0

; log_baud_rate: 115200(기본값)
; 익소스피어 로깅 보드속도를 제어합니다.
; 안내: 0=115200.
log_baud_rate=115200

; log_inverted: 0=비활성화(기본값), 1=활성화
; UART 포트의 로깅 반전 여부를 제어합니다.
log_inverted=0